<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Menghong Tann</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%234f46e5'/%3E%3Cstop offset='1' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='42' font-family='Arial,Helvetica,sans-serif' font-size='26' font-weight='700' fill='white' text-anchor='middle'%3EMT%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <script>
    var savedTheme = localStorage.getItem("theme");
    if (savedTheme) document.documentElement.setAttribute("data-theme", savedTheme);
  </script>
  <style>
    .not-found {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      gap: 18px;
    }
    .not-found-code {
      font-family: "Sora", sans-serif;
      font-size: clamp(4rem, 14vw, 7rem);
      font-weight: 800;
      line-height: 1;
      background: var(--gradient);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .not-found h1 { font-size: clamp(1.3rem, 3vw, 1.7rem); }
    .not-found p { max-width: 440px; color: var(--text-muted); }
    .not-found .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  </style>
</head>
<body>
  <main class="not-found">
    <p class="not-found-code" aria-hidden="true">404</p>
    <h1>This page wandered off.</h1>
    <p>The link you followed doesn't match anything on this site. Head back home, or jump straight to the projects.</p>
    <div class="hero-actions">
      <a href="index.html" class="btn btn-primary">Back to Home</a>
      <a href="index.html#projects" class="btn btn-secondary">View Projects</a>
    </div>
  </main>
</body>
</html>
