<body>
  <a href="#main-content" class="skip-link">Skip to content</a>
  <div id="scroll-progress" class="scroll-progress" aria-hidden="true"></div>
  <header class="navbar">
    <div class="container">
      <a href="#home" class="logo">Menghong<span>.</span></a>
      <nav id="nav-links" class="nav-links">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#resume">Resume</a>
        <a href="#contact">Contact</a>
      </nav>
      <div class="nav-actions">
        <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">🌙</button>
        <button id="nav-toggle" class="nav-toggle" aria-label="Toggle menu">☰</button>
      </div>
    </div>
  </header>
  <div id="nav-backdrop" class="nav-backdrop"></div>

  <main id="main-content">
    <section id="home" class="hero">
      <div class="hero-bg" aria-hidden="true"></div>
      <div class="container hero-inner">
        <div class="hero-avatar" id="hero-avatar" aria-hidden="true"></div>
        <p class="availability-badge" id="availability-badge"></p>
        <p class="hero-eyebrow" id="hero-eyebrow"></p>
        <h1>Hi, I'm <span id="hero-name"></span></h1>
        <p class="hero-lead" id="hero-lead"></p>
        <div class="hero-actions">
          <a href="#projects" class="btn btn-primary">View My Work</a>
          <a href="#contact" class="btn btn-secondary">Get in Touch</a>
        </div>
        <ul class="hero-stats" id="hero-stats"></ul>
      </div>
    </section>

    <section id="about" class="alt-bg">
      <div class="container">
        <div class="section-head">
          <span class="section-tag">About</span>
          <h2>Who I Am</h2>
        </div>
        <div class="about-grid">
          <div class="about-intro reveal" id="about-text"></div>
          <div class="skills-block reveal">
            <h3 class="skills-title">Core Skills</h3>
            <ul id="skills-list" class="skills-list"></ul>
          </div>
        </div>
      </div>
    </section>

    <section id="projects">
      <div class="container">
        <div class="section-head">
          <span class="section-tag">Work</span>
          <h2>Projects</h2>
        </div>
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="android">Android</button>
          <button class="filter-btn" data-filter="web">Web</button>
        </div>
        <div id="projects-grid" class="projects-grid"></div>
      </div>
    </section>

    <section id="resume" class="alt-bg">
      <div class="container">
        <div class="section-head">
          <span class="section-tag">Background</span>
          <h2>Resume</h2>
        </div>
        <div class="resume-actions">
          <button id="print-resume" class="btn btn-secondary">Print / Save as PDF</button>
        </div>
        <div id="resume-timeline"></div>
      </div>
    </section>

    <section id="contact">
      <div class="container">
        <div class="section-head">
          <span class="section-tag">Get in Touch</span>
          <h2>Contact</h2>
        </div>
        <div class="contact-wrap">
          <div class="contact-info reveal">
            <p id="contact-intro"></p>
            <ul class="contact-links" id="contact-links"></ul>
          </div>
          <form id="contact-form" class="reveal" novalidate>
            <div class="field">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" placeholder="Your name" />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@example.com" />
            </div>
            <div class="field">
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="What's on your mind?"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
            <p id="form-status" class="form-status"></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <ul id="footer-social" class="footer-social"></ul>
      <p>&copy; <span id="year"></span> <span id="footer-name"></span>. Built with HTML, CSS &amp; JavaScript.</p>
      <p class="admin-link"><a href="admin.html">Admin</a></p>
    </div>
  </footer>

  <button id="back-to-top" class="back-to-top" aria-label="Back to top">↑</button>

  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="Project image preview">
    <button id="lightbox-close" class="lightbox-close" type="button" aria-label="Close preview">✕</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
